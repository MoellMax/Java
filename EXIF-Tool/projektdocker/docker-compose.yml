
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: Password
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.de
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_ADDRESS: 0.0.0.0
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  backend:
    build:
      context: ../
      dockerfile: projektdocker/payara.Dockerfile
    ports:
      - "8080:8080"
      - "4848:4848"
    depends_on:
      - postgres
    


  frontend:
    build:
     context: ..
     dockerfile: projektdocker/svelte.Dockerfile
    ports:
     - "5173:5173"
    volumes:
     - ../ExifGuiTool:/app
     - frontend_node_modules:/app/node_modules
    environment:
     - CHOKIDAR_USEPOLLING=true

volumes:
  frontend_node_modules:
  pgadmin_data: